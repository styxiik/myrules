mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
ipv6: true
log-level: error
external-controller: 127.0.0.1:9090
profile:
  store-selected: false
  store-fake-ip: true
tun:
  enable: true
  stack: system # or gvisor system
  dns-hijack:
    - 198.18.0.2:53
  auto-route: true
  auto-detect-interface: true

proxy-providers:
  All: 
    type: http
    url: "Clash订阅链接" 
    interval: 7200
    path: ./Proxy/All.yaml 
    filter: '(1.5|2.0|2.5)'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

  TW: 
    type: http
    url: "Clash订阅链接" 
    interval: 7200
    path: ./Proxy/TW.yaml 
    filter: '台湾'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204
      
  Myown: 
    type: http
    url: "Myown订阅链接" 
    interval: 7200
    path: ./Proxy/Myown.yaml 
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

proxy-groups:
  - name: "最终选择"
    type: select
    proxies:
      - DIRECT
      - PROXY

  - name: "哔哩哔哩"
    type: select
    proxies:
      - DIRECT
      - 台湾

  - name: "PROXY"
    type: select
    proxies:
      - All
      - Myown

  - name: "Myown"
    type: url-test
    use:
      - Myown
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 20
    
  - name: "All"
    type: url-test
    use:
      - All
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 280

  - name: "台湾"
    use:
      - TW
    type: url-test
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 50

rule-providers:
  AntiAd:
    type: http
    behavior: domain
    path: ./RuleSet/AntiAd.yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml"
    interval: 7200

  ClashReject:
    type: http
    behavior: classical
    path: ./RuleSet/ClashReject.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashReject.yaml"
    interval: 7200

  ClashProxy:
    type: http
    behavior: classical
    path: ./RuleSet/ClashProxy.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashProxy.yaml"
    interval: 7200

  Global:
    type: http
    behavior: classical
    path: ./RuleSet/Global.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/Global.yaml"
    interval: 7200

  Streaming:
    type: http
    behavior: classical
    path: ./RuleSet/Streaming.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/StreamingMedia/Streaming.yaml"
    interval: 7200

  Telegram:
    type: http
    behavior: classical
    path: ./RuleSet/Telegram.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Extra/Telegram/Telegram.yaml"
    interval: 7200

  ClashStreaming:
    type: http
    behavior: classical
    path: ./RuleSet/ClashStreaming.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashStreaming.yaml"
    interval: 7200

  StreamingSE:
    type: http
    behavior: classical
    path: ./RuleSet/StreamingSE.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/StreamingMedia/StreamingSE.yaml"
    interval: 7200

  ClashDirect:
    type: http
    behavior: classical
    path: ./RuleSet/ClashDirect.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashDirect.yaml"
    interval: 7200

  Unbreak:
    type: http
    behavior: classical
    path: ./RuleSet/Unbreak.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Unbreak.yaml"
    interval: 7200

  Apple:
    type: http
    behavior: classical
    path: ./RuleSet/Apple.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Extra/Apple/Apple.yaml"
    interval: 7200

  China:
    type: http
    behavior: classical
    path: ./RuleSet/China.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/China.yaml"
    interval: 7200

  ChinaIP:
    type: http
    behavior: ipcidr
    path: ./RuleSet/ChinaIP.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Extra/ChinaIP.yaml"
    interval: 7200

script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443
    zerotier: network == 'udp' and dst_port == 9993
rules:
  - SCRIPT,quic,REJECT
  - SCRIPT,zerotier,DIRECT
  - RULE-SET,AntiAd,REJECT
  - RULE-SET,ClashReject,REJECT
  - RULE-SET,ClashProxy,PROXY
  - RULE-SET,Global,PROXY
  - RULE-SET,Telegram,PROXY
  - RULE-SET,Streaming,PROXY
  - RULE-SET,ClashStreaming,PROXY
  - RULE-SET,StreamingSE,哔哩哔哩
  - RULE-SET,ClashDirect,DIRECT
  - RULE-SET,Unbreak,DIRECT
  - RULE-SET,Apple,DIRECT
  - RULE-SET,China,DIRECT
  - RULE-SET,ChinaIP,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,最终选择
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    - tls://dot.pub:853
    - https://223.5.5.5/dns-query
    - tls://223.5.5.5:853
  fallback:
    - MywonDNS
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
