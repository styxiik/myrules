mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
ipv6: true
log-level: error
external-controller: 127.0.0.1:9090
profile:
  store-selected: false
  store-fake-ip: true
tun:
  enable: true
  stack: system # or gvisor system
  dns-hijack:
    - 198.18.0.2:53
  auto-route: true
  auto-detect-interface: true

proxy-providers:
  HK: 
    type: http
    url: "Clash订阅链接" 
    interval: 7200
    path: ./Proxy/HK.yaml 
    filter: 'V4.*香港.*(2.5|2.0|1.5)'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

  TW: 
    type: http
    url: "Clash订阅链接" 
    interval: 7200
    path: ./Proxy/TW.yaml 
    filter: 'V4.*台湾.*(2.5|2.0)'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

  JP: 
    type: http
    url: "Clash订阅链接" 
    interval: 7200
    path: ./Proxy/JP.yaml 
    filter: 'V4.*日本.*(2.5|2.0)'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

  SG: 
    type: http
    url: "Clash订阅链接" 
    interval: 7200
    path: ./Proxy/SG.yaml 
    filter: 'V4.*新加坡.*2.5'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

  Backup: 
    type: http
    url: "备用链接" 
    interval: 7200
    path: ./Proxy/Backup.yaml 
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204


proxy-groups:
  - name: "最终选择"
    type: select
    proxies:
      - DIRECT
      - PROXY

  - name: "哔哩哔哩"
    type: select
    proxies:
      - DIRECT
      - 香港
      - 台湾

  - name: "流媒体"
    type: select
    proxies:
      - PROXY
      - 新加坡
      - 香港
      - 日本
      - 台湾

  - name: "PROXY"
    type: select
    proxies:
      - Normal
      - Backup

  - name: "Backup"
    type: url-test
    use:
      - Backup
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 20

  - name: "Normal"
    type: url-test
    proxies:
      - 新加坡
      - 香港
      - 日本
      - 台湾
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 280

  - name: "香港"
    use:
      - HK
    type: url-test
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 50

  - name: "台湾"
    use:
      - TW
    type: url-test
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 50

  - name: "日本"
    use:
      - JP
    type: url-test
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 50

  - name: "新加坡"
    use:
      - SG
    type: url-test
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 50

rule-providers:
  ClashProxy:
    type: http
    behavior: classical
    path: ./RuleSet/ClashProxy.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashProxy.yaml"
    interval: 7200

  ClashDirect:
    type: http
    behavior: classical
    path: ./RuleSet/ClashDirect.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashDirect.yaml"
    interval: 7200

  ClashReject:
    type: http
    behavior: classical
    path: ./RuleSet/ClashReject.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashReject.yaml"
    interval: 7200

  ClashStreaming:
    type: http
    behavior: classical
    path: ./RuleSet/ClashStreaming.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashStreaming.yaml"
    interval: 7200

  Streaming:
    type: http
    behavior: classical
    path: ./RuleSet/Streaming.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/StreamingMedia/Streaming.yaml"
    interval: 7200

  StreamingSE:
    type: http
    behavior: classical
    path: ./RuleSet/StreamingSE.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/StreamingMedia/StreamingSE.yaml"
    interval: 7200

  AntiAd:
    type: http
    behavior: domain
    path: ./RuleSet/AntiAd.yaml
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml"
    interval: 7200

  Unbreak:
    type: http
    behavior: classical
    path: ./RuleSet/Unbreak.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Unbreak.yaml"
    interval: 7200

  Global:
    type: http
    behavior: classical
    path: ./RuleSet/Global.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Global.yaml"
    interval: 7200

  China:
    type: http
    behavior: classical
    path: ./RuleSet/China.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/China.yaml"
    interval: 7200

  ChinaIP:
    type: http
    behavior: ipcidr
    path: ./RuleSet/ChinaIP.yaml
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Extra/ChinaIP.yaml"
    interval: 7200
script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443
rules:
  - SCRIPT,quic,REJECT
  - RULE-SET,ClashProxy,PROXY
  - RULE-SET,ClashDirect,DIRECT
  - RULE-SET,ClashReject,REJECT
  - RULE-SET,ClashStreaming,流媒体
  - RULE-SET,StreamingSE,哔哩哔哩
  - RULE-SET,Streaming,流媒体
  - RULE-SET,AntiAd,REJECT
  - RULE-SET,Unbreak,DIRECT
  - RULE-SET,Global,PROXY
  - RULE-SET,China,DIRECT
  - RULE-SET,ChinaIP,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,最终选择
