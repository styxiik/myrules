mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
ipv6: true
log-level: error
external-controller: 127.0.0.1:9090
profile:
  store-selected: false
  store-fake-ip: true
tun:
  enable: true
  stack: system # or gvisor system
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true

proxy-providers:
  MYOWN: 
    type: http
    url: "MyownClash订阅" 
    interval: 7200
    path: ./Proxy/MYOWN.yaml 
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204
      
  MYKR: 
    type: http
    url: "MyownClash订阅" 
    interval: 7200
    path: ./Proxy/MYKR.yaml 
    filter: '(KR|韩国)'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

  MYJP: 
    type: http
    url: "MyownClash订阅" 
    interval: 7200
    path: ./Proxy/MYJP.yaml 
    filter: '(JP|日本)'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204

  Other: 
    type: http
    url: "Clash订阅链接" 
    interval: 7200
    path: ./Proxy/Other.yaml 
    # filter: '(1.5|2.0|2.5)'
    health-check:
      enable: true
      interval: 15
      url: http://edge.microsoft.com/captiveportal/generate_204
      
proxy-groups:
  - name: "最终选择"
    type: select
    proxies:
      - DIRECT
      - PROXY

  - name: "PROXY"
    type: select
    proxies:
      - MY
      - KR
      - JP
      - Other

  - name: "MY"
    type: select
    use:
      - MYOWN
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 100
    
  - name: "KR"
    type: fallback
    use:
      - MYKR
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 100

  - name: "JP"
    type: fallback
    use:
      - MYJP
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 100

  - name: "Other"
    type: url-test
    use:
      - Other
    url: http://edge.microsoft.com/captiveportal/generate_204
    interval: 15
    tolerance: 200

rule-providers:
  ClashReject:
    type: http
    behavior: classical
    path: ./RuleSet/ClashReject.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashReject.yaml"
    interval: 7200

  ClashDirect:
    type: http
    behavior: classical
    path: ./RuleSet/ClashDirect.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashDirect.yaml"
    interval: 7200

  ClashProxy:
    type: http
    behavior: classical
    path: ./RuleSet/ClashProxy.yaml
    url: "https://raw.githubusercontent.com/styxiik/myrules/main/Clash/ClashProxy.yaml"
    interval: 7200

  direct:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 7200

  icloud:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 7200

  apple:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 7200

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Extra/ChinaIP.yaml"
    path: ./ruleset/cncidr.yaml
    interval: 7200

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 7200

  Global:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Global.yaml"
    path: ./ruleset/global.yaml
    interval: 7200

  StreamingMedia:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/StreamingMedia/Streaming.yaml"
    path: ./ruleset/global.yaml
    interval: 7200

  gfw:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 7200

  Telegram:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Clash/RuleSet/Extra/Telegram/Telegram.yaml"
    path: ./ruleset/telegram.yaml
    interval: 7200

script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443
    zerotier: network == 'udp' and dst_port == 9993
    printer: network == 'tcp' and dst_port == 445
    snmp: network == 'udp' and dst_port == 161
rules:
  - SCRIPT,quic,REJECT
  - SCRIPT,zerotier,DIRECT
  - SCRIPT,printer,DIRECT
  - SCRIPT,snmp,REJECT
  - DOMAIN-SUFFIX,mydomain1,DIRECT
  - DOMAIN-SUFFIX,mydomain2,DIRECT
  - RULE-SET,ClashReject,REJECT
  - RULE-SET,ClashDirect,DIRECT
  - RULE-SET,ClashProxy,PROXY
  - RULE-SET,direct,DIRECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,cncidr,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,Global,PROXY
  - RULE-SET,StreamingMedia,PROXY
  - RULE-SET,gfw,PROXY
  - RULE-SET,Telegram,PROXY
  - GEOIP,CN,DIRECT
  - MATCH,最终选择
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
